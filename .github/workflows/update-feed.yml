name: Update YUTorah Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS feed
        run: |
          curl -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -o feed.xml \
            "https://www.yutorah.org/search/itunes?q=&f=teacherid:81241,collectionid:9915,teacherishidden:0&s=shiurdate%20asc"

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add feed.xml
          git diff --staged --quiet || git commit -m "Update feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
