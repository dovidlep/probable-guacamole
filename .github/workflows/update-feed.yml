name: Update YUTorah Feed
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch RSS feed
        run: |
          curl -L -H "User-Agent: Mozilla/5.0" -o feed.xml "https://www.yutorah.org/search/itunes?q=&f=teacherid:81241,collectionid:9915,teacherishidden:0&s=shiurdate%20asc"
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add feed.xml
          git diff --staged --quiet || git commit -m "Update feed"
          git push
